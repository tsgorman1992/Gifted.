kind = "web"
  previewPath = "/"
  title = "gifted."
  version = "1.0.0"
  id = "artifacts/gifted"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  localPort = 20908
  name = "web"
  paths = ["/"]

  [services.development]
  run = "pnpm --filter @workspace/gifted run dev"

  [services.env]
  PORT = "20908"
  BASE_PATH = "/"

  [services.production]
  build = ["pnpm", "--filter", "@workspace/gifted", "run", "build"]
  run = "pnpm --filter @workspace/gifted run start"
  publicDir = "artifacts/gifted/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"
  